listener {
    timeout = 300  # 5min, if I am not in dom, or time to sleep. 
    on-timeout = ~/.config/hypr/scripts/smart_idle.sh && hyprctl dispatch 'hl.dsp.dpms({action="off"})' && openrgb -p off
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action="on"})'
}
listener {
    timeout = 1200  # 20min, if I am in dom and not time to sleep.
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({action="off"})'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action="on"})'
}
